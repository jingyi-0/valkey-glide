# The cross platform build was created based on the [Packaging Rust Applications for the NPM Registry blog](https://blog.orhun.dev/packaging-rust-for-npm/).

name: PyPI - Continuous Deployment

on:
    pull_request:
        paths:
            - .github/workflows/pypi-cd.yml
            - .github/workflows/build-python-wrapper/action.yml
            - .github/workflows/start-self-hosted-runner/action.yml
            - .github/actions/install-shared-dependencies/action.yml
            - .github/actions/install-engine/action.yml
            - .github/json_matrices/**
            - .github/workflows/create-test-matrices/action.yml
    push:
        tags:
            - "v*.*"
    workflow_dispatch:
        inputs:
            version:
                description: "The release version of GLIDE, formatted as *.*.* or *.*.*-rc*"
                required: true
            publish_async:
                description: "Publish Async Client to PyPI"
                required: true
                type: boolean
                default: false
            publish_sync:
                description: "Publish Sync Client to PyPI"
                required: true
                type: boolean
                default: false

concurrency:
    group: pypi-${{ github.head_ref || github.ref }}
    cancel-in-progress: true

permissions:
    id-token: write
    attestations: write

jobs:
    load-platform-matrix:
        runs-on: ubuntu-latest
        environment: AWS_ACTIONS
        outputs:
            PLATFORM_MATRIX: ${{ steps.load-platform-matrix.outputs.PLATFORM_MATRIX }}
            TESTS_PLATFORM_MATRIX: ${{ steps.load-platform-matrix.outputs.TESTS_PLATFORM_MATRIX }}
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: load-platform-matrix
              id: load-platform-matrix
              shell: bash
              run: |

                  # For testing, Filter entries with pypi in PACKAGE_MANAGERS
                  export TESTS_PLATFORM_MATRIX=$(jq 'map(
                      select(.PACKAGE_MANAGERS != null and (.PACKAGE_MANAGERS | contains(["pypi"])))
                  )' < .github/json_matrices/build-matrix.json | jq -c .)
                  echo "TESTS_PLATFORM_MATRIX=${TESTS_PLATFORM_MATRIX}" >> $GITHUB_OUTPUT

                  # For building and publishing, replace "ephemeral" with "persistent" in RUNNER
                  export PLATFORM_MATRIX=$(echo "${TESTS_PLATFORM_MATRIX}" | jq 'map(
                      .RUNNER = (
                          if (.RUNNER | type == "array")
                          then (.RUNNER | map(if . == "ephemeral" then "persistent" else . end))
                          else (if .RUNNER == "ephemeral" then "persistent" else .RUNNER end)
                          end
                      )
                  )' | jq -c .)
                  echo "PLATFORM_MATRIX=${PLATFORM_MATRIX}" >> $GITHUB_OUTPUT

    start-self-hosted-runner:
        if: github.repository_owner == 'valkey-io'
        runs-on: ubuntu-latest
        environment: AWS_ACTIONS
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  fetch-depth: 0

            - name: Start self hosted EC2 runner
              uses: ./.github/workflows/start-self-hosted-runner
              with:
                  role-to-assume: ${{ secrets.ROLE_TO_ASSUME }}
                  aws-region: ${{ secrets.AWS_REGION }}
                  ec2-instance-id: ${{ secrets.AWS_EC2_INSTANCE_ID }}

    publish-binaries:
        needs: [start-self-hosted-runner, load-platform-matrix]
        if: github.repository_owner == 'valkey-io'
        name: Publish packages to PyPi
        runs-on: ${{ matrix.build.RUNNER }}
        timeout-minutes: 120
        strategy:
            fail-fast: false
            matrix:
                build: ${{ fromJson(needs.load-platform-matrix.outputs.PLATFORM_MATRIX) }}
        outputs:
            release_version: ${{ steps.set_version.outputs.RELEASE_VERSION }}
        steps:
            - name: Setup self-hosted runner access
              if: ${{ contains(matrix.build.RUNNER, 'self-hosted') }}
              run: sudo chown -R $USER:$USER /home/ubuntu/actions-runner/_work/valkey-glide

            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  submodules: "true"

            - name: Set the release version
              id: set_version
              shell: bash
              run: |
                  if ${{ env.EVENT_NAME == 'pull_request' }}; then
                    R_VERSION="0.1.0"
                  elif ${{ env.EVENT_NAME == 'workflow_dispatch' }}; then
                    R_VERSION="${{ env.INPUT_VERSION }}"
                  else
                    R_VERSION=${GITHUB_REF:11}
                  fi
                  echo "RELEASE_VERSION=${R_VERSION}" >> $GITHUB_ENV
                  echo "RELEASE_VERSION=${R_VERSION}" >> $GITHUB_OUTPUT
              env:
                  EVENT_NAME: ${{ github.event_name }}
                  INPUT_VERSION: ${{ github.event.inputs.version }}

            - name: Check that the release version dont have typo init
              if: ${{ github.event_name != 'pull_request' && contains(env.RELEASE_VERSION, '-') && !contains(env.RELEASE_VERSION, 'rc') }}
              run: |
                  echo "The release version "${{ env.RELEASE_VERSION }}" contains a typo, please fix it"
                  echo "The release version should be in the format v{major-version}.{minor-version}.{patch-version}-rc{release-candidate-number} when it a release candidate or v{major-version}.{minor-version}.{patch-version} in a stable release."
                  exit 1

            - name: Set the package version for Python
              working-directory: ./python
              run: |
                  SED_FOR_MACOS=`if [[ "${{ matrix.build.OS }}" =~ .*"macos".*  ]]; then echo "''"; fi`
                  # Set the version for the Async, Sync and Shared packages
                  # List of packages to update
                  for package in glide-async glide-sync glide-shared; do
                    echo "Patching version in $package/pyproject.toml"
                    sed -i $SED_FOR_MACOS "s/^dynamic = \[\s*\"version\"\s*\]/version = \"${{ env.RELEASE_VERSION }}\"/" "./$package/pyproject.toml"

                    # Log the updated file
                    cat "./$package/pyproject.toml"
                  done

            - name: Install Python 3.14 on persistent self-hosted runner
              if: ${{ contains(matrix.build.RUNNER, 'self-hosted') && contains(matrix.build.RUNNER, 'persistent') }}
              run: |
                  # Note: We currently only have Linux persistent self-hosted runner. If persistent self-hosted macOS runners
                  # are added to the matrix for CD pipelines, update this step to conditionally use:
                  #     brew install python@3.14 && brew link python@3.14
                  if ! command -v python3.14 &> /dev/null; then
                      sudo apt update
                      sudo apt install -y python3.14 python3.14-dev
                      python3.14 -m ensurepip --upgrade
                      python3.14 -m pip install --upgrade pip
                  fi

            - name: Set up Python 3.14
              if: ${{ !contains(matrix.build.RUNNER, 'self-hosted') }}
              id: setup_python
              uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
              with:
                  python-version: "3.14"

            - name: Update package version in config.toml for the async client
              uses: ./.github/workflows/update-glide-version
              with:
                  folder_path: "${{ github.workspace }}/python/glide-async/.cargo"
                  named_os: ${{ matrix.build.NAMED_OS }}

            - name: Update package version in config.toml for the sync client
              uses: ./.github/workflows/update-glide-version
              with:
                  folder_path: "${{ github.workspace }}/ffi/.cargo"
                  named_os: ${{ matrix.build.NAMED_OS }}

            ### BUILD ###

            - name: Build Python Sync and Async wrappers
              uses: ./.github/workflows/build-python-wrapper
              with:
                  os: ${{ matrix.build.OS }}
                  target: ${{ matrix.build.TARGET }}
                  publish: "true"
                  github-token: ${{ secrets.GITHUB_TOKEN }}

            - name: Install protoc 3.20.0
              run: |
                  PB_REL="https://github.com/protocolbuffers/protobuf/releases"

                  OS=$(uname -s)
                  ARCH=$(uname -m)

                  # Determine OS prefix
                  if [[ "$OS" == "Linux" ]]; then
                    OS_PREFIX="linux"
                  elif [[ "$OS" == "Darwin" ]]; then
                    OS_PREFIX="osx"
                  else
                    echo "Unsupported OS: $OS"
                    exit 1
                  fi

                  # Determine architecture
                  if [[ "$ARCH" == "x86_64" ]]; then
                    PROTOC_ARCH="x86_64"
                  elif [[ "$ARCH" == "aarch64" || "$ARCH" == "arm64" ]]; then
                    PROTOC_ARCH="aarch_64"
                  else
                    echo "Unsupported architecture: $ARCH"
                    exit 1
                  fi

                  # Use 3.20.0 (has all platform binaries including osx-aarch_64)
                  PROTOC_ZIP="protoc-3.20.0-${OS_PREFIX}-${PROTOC_ARCH}.zip"
                  echo "Downloading: $PROTOC_ZIP"

                  curl -LO "$PB_REL/download/v3.20.0/$PROTOC_ZIP"

                  # Install to a custom directory, not /usr/local
                  sudo mkdir -p /opt/protoc
                  sudo unzip -o "$PROTOC_ZIP" -d /opt/protoc

                  # Add only the protoc bin directory to PATH
                  echo "/opt/protoc/bin" >> $GITHUB_PATH

                  /opt/protoc/bin/protoc --version

            - name: Generate protobuf files
              working-directory: ./python
              run: |
                  # Verify correct protoc is used
                  which protoc
                  protoc --version

                  python3 dev.py protobuf

            - name: Include protobuf files in the package
              working-directory: ./python
              run: |
                  # Protobuf files are ignored by .gitignore, which affects packaging tools.
                  # To include them in the build, we temporarily remove them from .gitignore.
                  SED_FOR_MACOS=`if [[ "${{ matrix.build.OS }}" =~ .*"macos".*  ]]; then echo "''"; fi`
                  sed -i $SED_FOR_MACOS '/pb2.py/d' .gitignore
                  # Log the edited .gitignore file
                  cat .gitignore

            - name: Symlink .gitignore into the sync and async folders
              working-directory: ./python
              run: |
                  # Ensures packaging tools exclude ignored files during build
                  ln -sf .gitignore glide-sync/.gitignore
                  ln -sf .gitignore glide-async/.gitignore

            - name: Copy README file into package directories
              working-directory: ./python
              run: |
                  # Copy the README file into each package directory to include it in the distributions
                  cp README.md glide-sync/README.md
                  cp README.md glide-async/README.md

            - name: Setup PyPy for macOS
              if: startsWith(matrix.build.NAMED_OS, 'darwin')
              run: |
                  # Install pypy
                  ARCH=$(uname -m)

                  if [[ "$ARCH" == "arm64" ]]; then
                    # Download PyPy for Apple Silicon
                    PYPY_VERSION_3_11=pypy3.11-v7.3.19-macos_arm64

                    echo "Downloading PyPy 3.11 for arm64"
                    curl -LO "https://downloads.python.org/pypy/${PYPY_VERSION_3_11}.tar.bz2"
                    sudo tar -xf "${PYPY_VERSION_3_11}.tar.bz2" --exclude="*/bin/python*" -C /opt

                  elif [[ "$ARCH" == "x86_64" ]]; then
                    PYPY_VERSION_3_11=pypy3.11-v7.3.19-macos_x86_64

                    echo "Downloading PyPy 3.11 for x86_64"
                    curl -LO "https://downloads.python.org/pypy/${PYPY_VERSION_3_11}.tar.bz2"
                    sudo tar -xf "${PYPY_VERSION_3_11}.tar.bz2" --exclude="*/bin/python*" -C /opt
                  fi

                  echo "/opt/${PYPY_VERSION_3_11}/bin" >> ${GITHUB_PATH}

                  sudo chmod -R a+rx /opt/pypy*/bin
                  sudo chmod -R a+rx /opt/pypy*/lib/*.dylib

            ### ASYNC CLIENT ###

            - name: Prepare the async client for deployment, vendor the glide-shared code
              working-directory: ./python
              run: cp -r glide-shared/glide_shared glide-async/python

            - name: Build Python Async client wheels (linux)
              if: startsWith(matrix.build.NAMED_OS, 'linux')
              uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
              with:
                  working-directory: ./python/glide-async
                  target: ${{ matrix.build.TARGET }}
                  args: --release --strip --out wheels -i ${{ github.event_name != 'pull_request' && 'python3.9 python3.10 python3.11 python3.12 python3.13 python3.14 pypy3.11' || 'python3.14' }}
                  manylinux: auto
                  container: ${{ matrix.build.CONTAINER != '' && matrix.build.CONTAINER || '2014' }}
                  docker-options: --pull always --rm
                  before-script-linux: |
                      # Install protobuf compiler
                      if [[ $(`which apt`) != '' ]]
                      then
                        echo "installing unzip and curl"
                        apt-get update
                        apt install unzip curl python3.14 pypy3 -y
                      fi
                      PB_REL="https://github.com/protocolbuffers/protobuf/releases"
                      ARCH=`uname -p`
                      if [[ $ARCH == 'x86_64' ]]; then
                        PROTOC_ARCH="x86_64"
                      elif [[ $ARCH == 'aarch64' ]]; then
                        PROTOC_ARCH="aarch_64"
                        export CC_aarch64_unknown_linux_gnu=gcc
                        export CFLAGS_aarch64_unknown_linux_gnu="-march=armv8-a"
                      else
                        echo "Running on unsupported architecture: $ARCH. Expected one of: ['x86_64', 'aarch64']"
                        exit 1
                      fi
                      curl -LO $PB_REL/download/v3.20.0/protoc-3.20.0-linux-${PROTOC_ARCH}.zip
                      unzip protoc-3.20.0-linux-${PROTOC_ARCH}.zip -d $HOME/.local
                      export PATH="$PATH:$HOME/.local/bin"

                      # Install PyPy
                      if [[ "$ARCH" == "x86_64" ]]; then
                        PYPY_VERSION_3_11=pypy3.11-v7.3.19-linux64

                        echo "Downloading PyPy 3.11 for x86_64"
                        curl -LO "https://downloads.python.org/pypy/${PYPY_VERSION_3_11}.tar.bz2"
                        tar -xf "${PYPY_VERSION_3_11}.tar.bz2" --exclude="*/bin/python*" -C /opt

                        export PATH="/opt/${PYPY_VERSION_3_11}/bin:$PATH"

                      elif [[ "$ARCH" == "aarch64" ]]; then
                        PYPY_VERSION_3_11=pypy3.11-v7.3.19-aarch64

                        echo "Downloading PyPy 3.11 for aarch64"
                        curl -LO "https://downloads.python.org/pypy/${PYPY_VERSION_3_11}.tar.bz2"
                        tar -xf "${PYPY_VERSION_3_11}.tar.bz2" --exclude="*/bin/python*" -C /opt

                        export PATH="/opt/${PYPY_VERSION_3_11}/bin:$PATH"
                      else
                        echo "Running on unsupported architecture: $ARCH. Expected one of: ['x86_64', 'aarch64']"
                        exit 1
                      fi

                      # Build FFI library and glide-shared native extension for async wheel
                      # Note: working directory inside container is python/glide-async
                      cd ../../ffi && cargo build --release && cd ..
                      cp ffi/target/release/libglide_ffi.so python/glide-async/python/glide_shared/
                      cd python/glide-shared
                      pip install maturin
                      # Build _fast_response for each Python interpreter available
                      # maturin-action will later build a separate async wheel per interpreter,
                      # and each wheel bundles all .so files from the include glob.
                      # Python will load the one matching its ABI at runtime.
                      maturin build --release --out /tmp/glide_shared_wheels -i python3.9 python3.10 python3.11 python3.12 python3.13 python3.14 pypy3.11 2>/dev/null || \
                      maturin build --release --out /tmp/glide_shared_wheels -i python3.14
                      for WHEEL in /tmp/glide_shared_wheels/*.whl; do
                        unzip -jo "$WHEEL" "glide_shared/_fast_response*.so" -d ../glide-async/python/glide_shared/ 2>/dev/null || true
                      done
                      cd ../glide-async

            # The macOS maturin-action does not support a before-script hook (unlike
            # the Linux action's before-script-linux). We must build the FFI library and
            # glide-shared native extension in a separate step. For Linux these are built
            # inside the manylinux container via before-script-linux for glibc ABI compat.
            - name: Build native dependencies for async client (macOS)
              if: startsWith(matrix.build.NAMED_OS, 'darwin')
              shell: bash
              run: |
                  # Build FFI library
                  cd ffi && cargo build --release --target ${{ matrix.build.TARGET }}
                  cp target/${{ matrix.build.TARGET }}/release/libglide_ffi.dylib ../python/glide-async/python/glide_shared/
                  cd ..
                  # Build glide-shared native extension (_fast_response) for all target interpreters
                  cd python/glide-shared
                  pip install maturin
                  maturin build --release --target ${{ matrix.build.TARGET }} --out /tmp/glide_shared_wheels \
                    -i ${{ github.event_name != 'pull_request' && 'python3.9 python3.10 python3.11 python3.12 python3.13 python3.14 pypy3.11' || 'python3.14' }}
                  for WHEEL in /tmp/glide_shared_wheels/*.whl; do
                    unzip -jo "$WHEEL" "glide_shared/_fast_response*.so" -d ../glide-async/python/glide_shared/ 2>/dev/null || true
                  done

            - name: Build Python Async client wheels (macos)
              if: startsWith(matrix.build.NAMED_OS, 'darwin')
              uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
              with:
                  maturin-version: 0.14.17
                  working-directory: ./python/glide-async
                  target: ${{ matrix.build.TARGET }}
                  args: --release --strip --out wheels -i  ${{ github.event_name != 'pull_request' && 'python3.9 python3.10 python3.11 python3.12 python3.13 python3.14 pypy3.11' || 'python3.14' }}

            ### SYNC CLIENT ###

            - name: Determine Python 3.14 path
              id: python_cmd
              run: |
                  # Use absolute path so python3.14 is never the default interpreter
                  if [[ -n "${{ steps.setup_python.outputs.python-path }}" ]]; then
                      echo "cmd=${{ steps.setup_python.outputs.python-path }}" >> "$GITHUB_OUTPUT"
                  elif command -v python3.14 &> /dev/null; then
                      echo "cmd=$(which python3.14)" >> "$GITHUB_OUTPUT"
                  else
                      echo "::error::python3.14 not found — required to build and test cp314 wheels"
                      exit 1
                  fi

            - name: Install cibuildwheel
              run: |
                  PY="${{ steps.python_cmd.outputs.cmd }}"
                  # Bootstrap pip via get-pip.py to avoid the broken system pip
                  # (system pip imports distutils which was removed in Python 3.12+)
                  curl -sS https://bootstrap.pypa.io/get-pip.py | $PY
                  $PY -m pip install "cibuildwheel>=4.0.0"

            - name: Determine cibuildwheel version and set enable flags
              id: cibw_config
              run: |
                  ${{ steps.python_cmd.outputs.cmd }} -m pip install setuptools
                  # PyPy builds are disabled by default from version 3
                  CIBW_VERSION=$(python3.14 -c "from importlib.metadata import version; print(version('cibuildwheel'))")
                  echo "Detected cibuildwheel version: $CIBW_VERSION"

                  ENABLE_FLAGS=""
                  # Use version sort to compare
                  if [[ "$(printf '%s\n' "3.0.0" "$CIBW_VERSION" | sort -V | head -n1)" == "3.0.0" ]]; then
                    ENABLE_FLAGS="pypy pypy-eol"
                  fi
                  echo "enable_flags=$ENABLE_FLAGS" >> "$GITHUB_OUTPUT"

            - name: Build Python Sync client wheels
              run: |
                  # we call cibuildwheel from the root folder in order to copy the whole folder tree to the docker
                  ${{ steps.python_cmd.outputs.cmd }} -m cibuildwheel python/glide-sync --output-dir python/glide-sync/wheels
              env:
                  CIBW_BUILD: ${{ github.event_name != 'pull_request' && 'cp39-* cp310-* cp311-* cp312-* cp313-* cp314-* pp311-*' || 'cp314-*' }}
                  CIBW_SKIP: "*-musl* *i686* *i386*"
                  CIBW_MANYLINUX_X86_64_IMAGE: manylinux2014
                  CIBW_MANYLINUX_AARCH64_IMAGE: manylinux2014
                  CIBW_ARCHS_LINUX: auto
                  CIBW_ARCHS_MACOS: auto
                  CIBW_ENABLE: ${{ steps.cibw_config.outputs.enable_flags }}
                  MACOSX_DEPLOYMENT_TARGET: "10.12"

            - name: Smoke test wheels
              run: |
                  # Use the same Python version used to build wheels (3.14) so pip selects
                  # the local cp314 wheel instead of falling back to a PyPI-published version.
                  # Create venvs with --without-pip since ensurepip is broken on the
                  # self-hosted runner, then bootstrap pip via get-pip.py.
                  PYTHON=${{ steps.python_cmd.outputs.cmd }}
                  curl -sS https://bootstrap.pypa.io/get-pip.py -o /tmp/get-pip.py

                  rm -rf /tmp/smoke-async /tmp/smoke-sync
                  $PYTHON -m venv --without-pip /tmp/smoke-async
                  /tmp/smoke-async/bin/python /tmp/get-pip.py
                  /tmp/smoke-async/bin/pip install --find-links python/glide-async/wheels "valkey-glide==${RELEASE_VERSION}"
                  /tmp/smoke-async/bin/python -c "from glide import GlideClient; print('Async smoke test passed')"

                  $PYTHON -m venv --without-pip /tmp/smoke-sync
                  /tmp/smoke-sync/bin/python /tmp/get-pip.py
                  /tmp/smoke-sync/bin/pip install --find-links python/glide-sync/wheels "valkey-glide-sync==${RELEASE_VERSION}"
                  /tmp/smoke-sync/bin/python -c "from glide_sync import GlideClient; print('Sync smoke test passed')"

            ### UPLOAD WHEELS ###

            - name: Upload Python Async client wheels
              if: github.event_name != 'pull_request'
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
              with:
                  name: wheels-${{ matrix.build.TARGET }}-async
                  path: python/glide-async/wheels
                  if-no-files-found: error

            - name: Upload Python Sync client wheels
              if: github.event_name != 'pull_request'
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
              with:
                  name: wheels-${{ matrix.build.TARGET }}-sync
                  path: python/glide-sync/wheels
                  if-no-files-found: error

    publish-async-to-pypi:
        if: ${{ github.event_name == 'push' || inputs.publish_async == true }}
        name: Publish the async PyPi package
        runs-on: ubuntu-latest
        environment: AWS_ACTIONS
        needs: publish-binaries
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Set the release version
              shell: bash
              run: |
                  echo "RELEASE_VERSION=${{needs.publish-binaries.outputs.release_version}}" >> $GITHUB_ENV

            - name: Set the package version for Python
              working-directory: ./python
              run: |
                  SED_FOR_MACOS=`if [[ "${{ matrix.build.OS }}" =~ .*"macos".*  ]]; then echo "''"; fi`
                  # Set the version for the Async, Sync and Shared packages
                  # List of packages to update
                  for package in glide-async glide-sync glide-shared; do
                    echo "Patching version in $package/pyproject.toml"
                    sed -i $SED_FOR_MACOS "s/^dynamic = \[\s*\"version\"\s*\]/version = \"${{ env.RELEASE_VERSION }}\"/" "./$package/pyproject.toml"

                    # Log the updated file
                    cat "./$package/pyproject.toml"
                  done

            - name: Copy README file into package directories
              working-directory: ./python
              run: |
                  cp README.md glide-sync/README.md
                  cp README.md glide-async/README.md

            ### ASYNC CLIENT ###

            - name: Async client - Build source distributions
              uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
              with:
                  working-directory: ./python/glide-async
                  command: sdist
                  args: --out sdist

            - name: Async client - Download binaries
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  pattern: wheels-*-async
                  path: python/glide-async/wheels
                  merge-multiple: true

            - name: Async client - Collect wheels and sdist for publishing
              run: |
                  mkdir -p python/glide-async/dist
                  cp python/glide-async/wheels/*.whl python/glide-async/dist/
                  cp python/glide-async/sdist/*.tar.gz python/glide-async/dist/

            - name: Async client - Publish binaries and source to PyPI
              # Trusted Publishing (OIDC) with PEP 740 attestations; requires the
              # top-level `id-token: write` permission and a GitHub-hosted runner.
              uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
              with:
                  packages-dir: python/glide-async/dist
                  skip-existing: true
                  attestations: true

            - name: Async client - Upload built wheels and sdist as GitHub artifacts
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
              with:
                  name: python-async-packages
                  path: |
                      python/glide-async/wheels/*.whl
                      python/glide-async/dist/*.tar.gz

    publish-sync-to-pypi:
        if: ${{ github.event_name == 'push' || inputs.publish_sync == true }}
        name: Publish the sync PyPi package
        runs-on: ubuntu-latest
        environment: AWS_ACTIONS
        needs: publish-binaries
        steps:
            - name: Checkout
              uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

            - name: Set the release version
              shell: bash
              run: |
                  echo "RELEASE_VERSION=${{needs.publish-binaries.outputs.release_version}}" >> $GITHUB_ENV

            - name: Set the package version for Python
              working-directory: ./python
              run: |
                  SED_FOR_MACOS=`if [[ "${{ matrix.build.OS }}" =~ .*"macos".*  ]]; then echo "''"; fi`
                  # Set the version for the Async, Sync and Shared packages
                  # List of packages to update
                  for package in glide-async glide-sync glide-shared; do
                    echo "Patching version in $package/pyproject.toml"
                    sed -i $SED_FOR_MACOS "s/^dynamic = \[\s*\"version\"\s*\]/version = \"${{ env.RELEASE_VERSION }}\"/" "./$package/pyproject.toml"

                    # Log the updated file
                    cat "./$package/pyproject.toml"
                  done

            - name: Copy README file into package directories
              working-directory: ./python
              run: |
                  cp README.md glide-sync/README.md
                  cp README.md glide-async/README.md

            ### SYNC CLIENT ###

            - name: Install build and release tools
              run: |
                  python3 -m pip install --upgrade pip
                  python3 -m pip install build
                  python3 -m pip install -U packaging

            - name: Sync client - Build source distributions
              working-directory: ./python/glide-sync
              run: |
                  python3 -m build --sdist

            - name: Sync client - Download binaries
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  pattern: wheels-*-sync
                  path: python/glide-sync/wheels
                  merge-multiple: true

            - name: Sync client - Collect wheels and sdist for publishing
              run: |
                  # The sdist is already in python/glide-sync/dist (from `build --sdist`);
                  # add the wheels alongside it so a single directory is published.
                  cp python/glide-sync/wheels/*.whl python/glide-sync/dist/

            - name: Sync client - Publish binaries and source to PyPI
              # Trusted Publishing (OIDC) with PEP 740 attestations; requires the
              # top-level `id-token: write` permission and a GitHub-hosted runner.
              uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
              with:
                  packages-dir: python/glide-sync/dist
                  skip-existing: true
                  attestations: true

            - name: Sync client - Upload built wheels and sdist as GitHub artifacts
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
              with:
                  name: python-sync-packages
                  path: |
                      python/glide-sync/wheels/*.whl
                      python/glide-sync/dist/*.tar.gz

    test-release:
        if: ${{ github.event_name == 'push' || inputs.publish_async== true || inputs.publish_sync == true }}
        name: Test the release
        runs-on: ${{ matrix.build.RUNNER }}
        needs:
            [
                publish-async-to-pypi,
                publish-sync-to-pypi,
                publish-binaries,
                load-platform-matrix,
            ]
        strategy:
            fail-fast: false
            matrix:
                build: ${{ fromJson(needs.load-platform-matrix.outputs.TESTS_PLATFORM_MATRIX) }}
        steps:
            - name: Setup self-hosted runner access
              if: ${{ matrix.build.TARGET == 'aarch64-unknown-linux-gnu' }}
              run: sudo chown -R $USER:$USER /home/ubuntu/actions-runner/_work/valkey-glide

            - name: checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Set up Python
              uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
              with:
                  python-version: 3.12

            - name: Setup PyPy for testing
              run: |
                  ARCH=$(uname -m)

                  if [[ "${{ matrix.build.NAMED_OS }}" == "linux" ]]; then
                    if [[ "$ARCH" == "x86_64" ]]; then
                      PYPY_VERSION_3_11=pypy3.11-v7.3.19-linux64
                      echo "Downloading PyPy 3.11 for x86_64"
                      curl -LO "https://downloads.python.org/pypy/${PYPY_VERSION_3_11}.tar.bz2"
                      sudo tar -xf "${PYPY_VERSION_3_11}.tar.bz2" --exclude="*/bin/python*" -C /opt

                    elif [[ "$ARCH" == "aarch64" ]]; then
                      PYPY_VERSION_3_11=pypy3.11-v7.3.19-aarch64
                      echo "Downloading PyPy 3.11 for aarch64"
                      curl -LO "https://downloads.python.org/pypy/${PYPY_VERSION_3_11}.tar.bz2"
                      sudo tar -xf "${PYPY_VERSION_3_11}.tar.bz2" --exclude="*/bin/python*" -C /opt
                    fi

                    sudo chmod -R a+rx /opt/${PYPY_VERSION_3_11}/bin

                  elif [[ "${{ matrix.build.NAMED_OS }}" == "darwin" ]]; then
                    if [[ "$ARCH" == "arm64" ]]; then
                      PYPY_VERSION_3_11=pypy3.11-v7.3.19-macos_arm64
                      echo "Downloading PyPy 3.11 for arm64"
                      curl -LO "https://downloads.python.org/pypy/${PYPY_VERSION_3_11}.tar.bz2"
                      sudo tar -xf "${PYPY_VERSION_3_11}.tar.bz2" --exclude="*/bin/python*" -C /opt

                    else
                      PYPY_VERSION_3_11=pypy3.11-v7.3.19-macos_x86_64
                      echo "Downloading PyPy 3.11 for x86_64"
                      curl -LO "https://downloads.python.org/pypy/${PYPY_VERSION_3_11}.tar.bz2"
                      sudo tar -xf "${PYPY_VERSION_3_11}.tar.bz2" --exclude="*/bin/python*" -C /opt
                    fi

                    sudo chmod -R a+rx /opt/${PYPY_VERSION_3_11}/bin
                    sudo chmod -R a+rx /opt/${PYPY_VERSION_3_11}/lib/*.dylib
                  fi

                  echo "/opt/${PYPY_VERSION_3_11}/bin" >> ${GITHUB_PATH}

            - name: Install engine build dependencies (ephemeral runners)
              if: ${{ contains(matrix.build.RUNNER, 'ephemeral') }}
              run: |
                  sudo apt update -y
                  sudo apt install -y pkg-config libssl-dev

            - name: Install engine
              uses: ./.github/actions/install-engine
              with:
                  engine-version: "8.0"
                  target: ${{ matrix.build.target }}

            - name: Check if RC and set a distribution tag for the package
              shell: bash
              env:
                  RELEASE_VERSION: ${{ needs.publish-binaries.outputs.release_version }}
              run: |
                  if [[ "$RELEASE_VERSION" == *"rc"* ]]
                  then
                    echo "This is a release candidate"
                    echo "PIP_PRE=true" >> $GITHUB_ENV
                  else
                    echo "This is a stable release"
                    echo "PIP_PRE=false" >> $GITHUB_ENV
                  fi

                  # Format the version for PyPI (remove leading 'v' and convert '-rc' to 'rc')
                  PYPI_VERSION="${RELEASE_VERSION#v}"
                  PYPI_VERSION="${PYPI_VERSION//-rc/rc}"
                  echo "PYPI_VERSION=${PYPI_VERSION}" >> $GITHUB_ENV

            - name: Run the Async Client tests
              if: ${{ inputs.publish_async == true }}
              shell: bash
              working-directory: ./utils/release-candidate-testing/python
              run: |
                  python -m venv venv
                  source venv/bin/activate
                  pip install -U pip
                  if [[ "${{ env.PIP_PRE }}" == "true" ]]; then
                    pip install "valkey-glide==${{ env.PYPI_VERSION }}"
                  else
                    pip install valkey-glide
                  fi
                  python async_rc_test.py

            - name: Run the Async Clients tests with PyPy
              if: ${{ inputs.publish_async == true }}
              shell: bash
              working-directory: ./utils/release-candidate-testing/python
              run: |
                  pypy3 -m venv pypy_venv
                  source pypy_venv/bin/activate
                  pip install -U pip
                  if [[ "${{ env.PIP_PRE }}" == "true" ]]; then
                    pip install "valkey-glide==${{ env.PYPI_VERSION }}"
                  else
                    pip install valkey-glide
                  fi
                  pypy3 async_rc_test.py

            - name: Run the Sync Client tests
              if: ${{ inputs.publish_sync == true }}
              shell: bash
              working-directory: ./utils/release-candidate-testing/python
              run: |
                  python -m venv venv
                  source venv/bin/activate
                  pip install -U pip
                  if [[ "${{ env.PIP_PRE }}" == "true" ]]; then
                    pip install "valkey-glide-sync==${{ env.PYPI_VERSION }}"
                  else
                    pip install valkey-glide-sync
                  fi
                  python sync_rc_test.py

            - name: Run the Sync Client tests with PyPy
              if: ${{ inputs.publish_sync == true }}
              shell: bash
              working-directory: ./utils/release-candidate-testing/python
              run: |
                  pypy3 -m venv pypy_venv
                  source pypy_venv/bin/activate
                  pip install -U pip
                  if [[ "${{ env.PIP_PRE }}" == "true" ]]; then
                    pip install "valkey-glide-sync==${{ env.PYPI_VERSION }}"
                  else
                    pip install valkey-glide-sync
                  fi
                  pypy3 sync_rc_test.py

            # Reset the repository to make sure we get the clean checkout of the action later in other actions.
            # It is not required since in other actions we are cleaning before the action, but it is a good practice to do it here as well.
            - name: Reset repository
              if: ${{ contains(matrix.build.RUNNER, 'self-hosted') }}
              shell: bash
              run: |
                  git reset --hard
                  git clean -xdf

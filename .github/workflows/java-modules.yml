name: Java Modules

permissions:
    contents: read

on:
    push:
        branches:
            - main
            - release-*
            - v*
        paths:
            - glide-core/src/**
            - glide-core/redis-rs/redis/src/**
            - java/client/src/main/java/glide/api/commands/servermodules/**
            - java/client/src/main/java/glide/api/models/commands/FT/**
            - java/client/src/main/java/glide/api/models/commands/json/**
            - java/integTest/src/test/java/glide/modules/**
            - .github/workflows/java-modules.yml
            - .github/actions/install-shared-dependencies/action.yml
            - .github/actions/install-engine/action.yml
            - .github/actions/start-valkey-docker/action.yml
    pull_request:
        paths:
            - glide-core/src/**
            - glide-core/redis-rs/redis/src/**
            - java/client/src/main/java/glide/api/commands/servermodules/**
            - java/client/src/main/java/glide/api/models/commands/FT/**
            - java/client/src/main/java/glide/api/models/commands/json/**
            - java/integTest/src/test/java/glide/modules/**
            - .github/workflows/java-modules.yml
            - .github/actions/install-shared-dependencies/action.yml
            - .github/actions/install-engine/action.yml
            - .github/actions/start-valkey-docker/action.yml
    workflow_dispatch:
        inputs:
            name:
                required: false
                type: string
                description: "(Optional) Test run name"
    workflow_call:

concurrency:
    group: java-modules-${{ github.head_ref || github.ref }}-${{ toJson(inputs) }}
    cancel-in-progress: true

run-name: ${{ github.event_name == 'workflow_dispatch' && (inputs.name == '' && format('{0} @ {1} {2}', github.ref_name, github.sha, toJson(inputs)) || inputs.name) || '' }}

jobs:
    test-modules-linux:
        name: Modules Tests (Linux)
        runs-on: ubuntu-latest
        timeout-minutes: 35
        steps:
            - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

            - name: Set up JDK
              uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
              with:
                  distribution: "temurin"
                  java-version: 17

            - name: Install shared software dependencies
              uses: ./.github/actions/install-shared-dependencies
              with:
                  os: ubuntu
                  target: x86_64-unknown-linux-gnu
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  engine-version: "9.0"
                  language: java

            - name: Install protoc (protobuf)
              uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3
              with:
                  version: "29.1"
                  repo-token: ${{ secrets.GITHUB_TOKEN }}

            - name: Start module servers via Docker
              uses: ./.github/actions/start-valkey-docker
              with:
                  engine-version: "9.0"

            - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
              with:
                  path: |
                      java/target
                      glide-core/src/generated
                  key: x86_64-unknown-linux-gnu-java
                  restore-keys: |
                      x86_64-unknown-linux-gnu-glide-core
                      x86_64-unknown-linux-gnu

            - name: Cache Gradle dependencies
              uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
              with:
                  path: |
                      ~/.gradle/caches
                      ~/.gradle/wrapper
                  key: ${{ runner.os }}-gradle-${{ hashFiles('java/**/*.gradle*', 'java/**/gradle-wrapper.properties') }}
                  restore-keys: |
                      ${{ runner.os }}-gradle-

            - name: Build and run modules tests
              working-directory: java
              env:
                  GLIDE_DOCKER_SERVERS: "true"
              run: |
                  ./gradlew :integTest:modulesTest \
                    -Dstandalone-endpoints=${{ env.MODULES_STANDALONE_ENDPOINT }} \
                    -Dcluster-endpoints=${{ env.MODULES_CLUSTER_ENDPOINTS }}

            - name: Upload test reports
              if: always()
              continue-on-error: true
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
              with:
                  name: test-reports-modules-java-docker
                  path: |
                      java/integTest/build/reports/**

    test-modules:
        if: github.repository_owner == 'valkey-io' && github.event_name == 'workflow_dispatch'
        environment: AWS_ACTIONS
        name: Modules Tests
        runs-on: [self-hosted, linux, ARM64, persistent]
        timeout-minutes: 15
        steps:
            - name: Setup self-hosted runner access
              run: sudo chown -R $USER:$USER /home/ubuntu/actions-runner/_work/valkey-glide

            - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

            - name: Set up JDK
              uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
              with:
                  distribution: "temurin"
                  java-version: 17

            - name: Install protoc (protobuf)
              uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3
              with:
                  version: "29.1"
                  repo-token: ${{ secrets.GITHUB_TOKEN }}

            - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
              with:
                  path: |
                      java/target
                      glide-core/src/generated
                  key: aarch64-unknown-linux-gnu-java
                  restore-keys: |
                      aarch64-unknown-linux-gnu-glide-core
                      aarch64-unknown-linux-gnu

            - name: Install zig
              uses: ./.github/actions/install-zig

            - name: Test java wrapper
              working-directory: java
              run: ./gradlew :integTest:modulesTest -Dcluster-endpoints=${{ secrets.MEMDB_MODULES_ENDPOINT }} -Dtls=true

            - name: Upload test reports
              if: always()
              continue-on-error: true
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
              with:
                  name: test-reports-modules-java
                  path: |
                      java/integTest/build/reports/**

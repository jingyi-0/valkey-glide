name: Start Valkey Servers via Docker
description: >
    Start standalone and cluster Valkey servers with modules (Search, JSON,
    Bloom, LDAP) using Docker containers on dedicated ports. These run
    alongside the source-built servers (on default ports) used by regular
    tests. Module-specific tests read the env vars written here to connect.
    Assumes valkey-cli is already on the host (installed by install-engine).

inputs:
    engine-version:
        description: >
            Valkey engine version (e.g. 9.1).
        required: true
    cluster-port-start:
        description: >
            Starting port for the 6-node cluster (uses 6 consecutive ports).
            Default is 8001, resulting in ports 8001-8006.
        required: false
        default: "8001"

runs:
    using: composite
    steps:
        - name: Determine Docker image
          id: docker-image
          shell: bash
          run: |
              IMAGE="valkey/valkey-bundle:9.1"
              echo "image=$IMAGE" >> $GITHUB_OUTPUT
              echo "Using Docker image: $IMAGE"

        - name: Pull Docker image
          shell: bash
          env:
              IMAGE: ${{ steps.docker-image.outputs.image }}
          run: |
              echo "Pulling $IMAGE..."
              docker pull "$IMAGE"

        - name: Start standalone Valkey server with modules (Docker)
          shell: bash
          env:
              IMAGE: ${{ steps.docker-image.outputs.image }}
          run: |
              echo "=== Starting standalone Valkey server with modules on port 6389 ==="

              docker run -d --name valkey-modules-standalone --network host \
                "$IMAGE" valkey-server \
                --port 6389 \
                --enable-debug-command yes \
                --protected-mode no \
                --save ""

              # Wait for ready
              READY=false
              for i in $(seq 1 30); do
                if valkey-cli -p 6389 PING 2>/dev/null | grep -q PONG; then
                  echo "Standalone server with modules ready on port 6389"
                  READY=true
                  break
                fi
                sleep 0.5
              done

              if [ "$READY" != "true" ]; then
                echo "ERROR: Standalone module server on port 6389 failed to start"
                docker logs valkey-modules-standalone 2>&1 || true
                exit 1
              fi

              echo "MODULES_STANDALONE_ENDPOINT=127.0.0.1:6389" >> $GITHUB_ENV

        - name: Start Valkey cluster with modules (Docker)
          shell: bash
          env:
              IMAGE: ${{ steps.docker-image.outputs.image }}
              ENGINE_VERSION: ${{ inputs.engine-version }}
              CLUSTER_PORT_START: ${{ inputs.cluster-port-start }}
          run: |
              PORT_START=${CLUSTER_PORT_START:-8001}
              PORT_END=$((PORT_START + 5))
              echo "=== Starting Valkey cluster with modules on ports ${PORT_START}-${PORT_END} ==="

              MAJOR=$(echo "$ENGINE_VERSION" | cut -d. -f1)
              EXTRA_ARGS=""
              if [ "$MAJOR" -ge 9 ]; then
                EXTRA_ARGS="--cluster-databases 16"
              fi

              for port in $(seq $PORT_START $PORT_END); do
                docker run -d --name "valkey-modules-cluster-${port}" --network host \
                  "$IMAGE" valkey-server \
                  --port "$port" \
                  --cluster-enabled yes \
                  --cluster-config-file "nodes-${port}.conf" \
                  --cluster-node-timeout 5000 \
                  --appendonly no \
                  --protected-mode no \
                  --enable-debug-command yes \
                  --save "" \
                  $EXTRA_ARGS
              done

              # Wait for all nodes
              for port in $(seq $PORT_START $PORT_END); do
                READY=false
                for i in $(seq 1 30); do
                  if valkey-cli -p $port PING 2>/dev/null | grep -q PONG; then
                    echo "  Cluster node $port: ready"
                    READY=true
                    break
                  fi
                  sleep 0.5
                done
                if [ "$READY" != "true" ]; then
                  echo "ERROR: Cluster module node on port $port failed to start"
                  docker logs "valkey-modules-cluster-${port}" 2>&1 || true
                  exit 1
                fi
              done

              # Build endpoint list dynamically
              ENDPOINTS=""
              for port in $(seq $PORT_START $PORT_END); do
                if [ -n "$ENDPOINTS" ]; then
                  ENDPOINTS="${ENDPOINTS},"
                fi
                ENDPOINTS="${ENDPOINTS}127.0.0.1:${port}"
              done

              # Form the cluster (3 primaries, 3 replicas)
              P1=$PORT_START
              P2=$((PORT_START + 1))
              P3=$((PORT_START + 2))
              P4=$((PORT_START + 3))
              P5=$((PORT_START + 4))
              P6=$((PORT_START + 5))
              valkey-cli --cluster create \
                127.0.0.1:$P1 127.0.0.1:$P2 127.0.0.1:$P3 \
                127.0.0.1:$P4 127.0.0.1:$P5 127.0.0.1:$P6 \
                --cluster-replicas 1 \
                --cluster-yes

              echo "MODULES_CLUSTER_ENDPOINTS=${ENDPOINTS}" >> $GITHUB_ENV
              echo "Cluster with modules ready on ports ${PORT_START}-${PORT_END}"

        - name: Verify module servers
          shell: bash
          env:
              CLUSTER_PORT_START: ${{ inputs.cluster-port-start }}
          run: |
              PORT_START=${CLUSTER_PORT_START:-8001}
              PORT_END=$((PORT_START + 5))
              echo "=== Module server verification ==="
              echo "Standalone with modules (6389): $(valkey-cli -p 6389 PING)"
              for port in $(seq $PORT_START $PORT_END); do
                echo "Cluster with modules node $port: $(valkey-cli -p $port PING)"
              done
